<div class="container">
  <div class="row justify-content-center mt-5 mb-5">
    <div class="col-sm-4"></div>

    <div class="col-sm-4 border border-2 rounded p-4 bg-light">
      <h3 class="text-center mb-4 text-primary">Login</h3>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Email input -->
        <div class="mb-3">
          <label class="form-label">Email address <span class="text-danger">*</span></label>
          <input
            formControlName="email"
            type="email"
            class="form-control"
            placeholder="Enter your email"
          />
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-danger">
            Email is required and must be valid.
          </div>
        </div>

        <!-- Password input -->
        <div class="mb-3">
          <label class="form-label">Password <span class="text-danger">*</span></label>
          <input
            formControlName="password"
            type="password"
            class="form-control"
            placeholder="Enter your password"
          />
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-danger">
            Password is required.
          </div>
        </div>

        <!-- Submit button -->
        <div class="d-grid">
          <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid">Login</button>
        </div>
      </form>

      <div class="text-center mt-3">
        <p>Don't have an account? <a href="#" (click)="goToSignup()">Sign up</a></p>
      </div>
    </div>

    <div class="col-sm-4"></div>
  </div>
</div>
