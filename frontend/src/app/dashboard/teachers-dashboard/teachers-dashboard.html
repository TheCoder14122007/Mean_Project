<div class="d-flex justify-content-end mb-3">
  <a
    href="#"
    class="btn bg-primary btn-sm background text-white"
    data-bs-toggle="modal"
    data-bs-target="#myModal"
  >
    <i class="fa fa-plus"></i> Add Teacher
  </a>
</div>

<!-- Error Message -->
<div *ngIf="errorMessage" class="alert alert-danger" role="alert">
  {{ errorMessage }}
  <button type="button" class="btn btn-sm btn-outline-danger ms-2" (click)="loadTeachers()">Retry</button>
</div>

<!-- Loading State -->
<div *ngIf="isLoading" class="text-center my-4">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
  <p class="mt-2">Loading teachers...</p>
</div>

<!-- Teachers Table -->
<div *ngIf="!isLoading && !errorMessage">
  <table class="table" *ngIf="teachers.length > 0; else noTeachers">
    <thead class="table-dark">
      <tr>
        <th class="background">Teacher Name</th>
        <th class="background">Subject</th>
        <th class="background">Designation</th>
        <th class="background">Profile Picture</th>
        <th class="text-end background">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let teacher of teachers">
        <td>{{ teacher.name || 'N/A' }}</td>
        <td>{{ teacher.subject || 'N/A' }}</td>
        <td>{{ teacher.designation || 'N/A' }}</td>
        <td>
          <img 
            [src]="teacher.profilePicture || 'default-profile.jpg'" 
            [alt]="teacher.name || 'Teacher'" 
            class="img-thumbnail" 
            style="width: 50px; height: 50px; object-fit: cover;"
          />
        </td>
        <td class="text-end">
          <i
            class="fa fa-pencil me-4"
            data-bs-toggle="modal"
            data-bs-target="#myModal"
            style="cursor: pointer;"
            (click)="editTeacher(teacher)"
          ></i>
          <i 
            class="fa fa-trash text-danger" 
            style="cursor: pointer;"
            (click)="deleteTeacher(teacher.id)"
          ></i>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- No Teachers Message -->
  <ng-template #noTeachers>
    <div class="text-center my-5">
      <i class="fa fa-users fa-3x text-muted mb-3"></i>
      <h4>No Teachers Found</h4>
      <p class="text-muted">There are no teachers registered yet.</p>
    </div>
  </ng-template>
</div>

<!-- The Modal -->
<div class="modal fade" id="myModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <!-- Modal Header -->
      <div class="modal-header">
        <h4 class="modal-title text text-center">Add/Edit Teacher</h4>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>
      </div>

      <!-- Modal body -->
      <div class="modal-body">
        <form>
          <div class="row">
            <!-- Part 1: Event Details -->
            <div class="col-md-6">
              <div class="mb-3">
                <label for="teacherName" class="form-label">Teacher Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="teacherName"
                  placeholder="Enter teacher name"
                />
              </div>
              <div class="mb-3">
                <label for="subject" class="form-label">Subject</label>
                <input
                  type="text"
                  class="form-control"
                  id="subject"
                  placeholder="Enter subject"
                />
              </div>
              <div class="mb-3">
                <label for="designation" class="form-label">Designation</label>
                <input
                  type="text"
                  class="form-control"
                  id="designation"
                  placeholder="Enter designation"
                />
              </div>
              <div class="mb-3">
                <label for="profilePicture" class="form-label"
                  >Profile Picture</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="profilePicture"
                  placeholder="Enter profile picture URL"
                />
              </div>
            </div>
            <!-- Part 2: Event Description -->
            <div class="col-md-6">
              <div class="mb-3 h-100 d-flex flex-column">
                <label for="bio" class="form-label">Bio</label>
                <textarea
                  class="form-control flex-grow-1"
                  id="bio"
                  rows="8"
                  placeholder="Enter bio"
                ></textarea>
              </div>
            </div>
          </div>
        </form>
        <!-- Modal footer -->
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-danger background btn-sm"
            data-bs-dismiss="modal"
          >
            Submit
          </button>
          <button
            type="button"
            class="btn btn-danger btn-sm"
            data-bs-dismiss="modal"
          >
            Close
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
